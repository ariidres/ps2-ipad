<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 iPad Multi-Format Emulator</title>
    <style>
        body { margin: 0; background-color: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #emulator-container { width: 95%; max-width: 800px; aspect-ratio: 4 / 3; background: black; border: 2px solid #333; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .controls { margin-top: 20px; text-align: center; }
        input[type="file"] { display: none; }
        .btn { background-color: #e50914; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background-color: #b80710; }
        #gamepad-status { margin-top: 15px; color: #888; font-size: 14px; }
        #file-info { margin-top: 5px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

    <h2>PS2 iPadOS Web Emulator (Multi-Format)</h2>
    
    <div id="emulator-container">
        <div id="placeholder">فایلی یاریەکە (ISO, BIN, CHD, ZIP) هەڵبژێره</div>
    </div>

    <div class="controls">
        <label class="btn" for="file-input">هاوردەکردنی فایل / یاری</label>
        <input type="file" id="file-input" accept=".iso,.bin,.chd,.zip,.7z">
        <div id="file-info">فۆرماتی ڕێگەپێدراو: ISO, BIN, CHD, ZIP</div>
        <div id="gamepad-status">کۆنتڕۆڵەر (جۆیستیک): نەبەستراوە</div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const gamepadStatus = document.getElementById('gamepad-status');
        const placeholder = document.getElementById('placeholder');

        // ناسینەوەی جۆیستیک لە ڕێگەی بلۆتووسەوە
        window.addEventListener("gamepadconnected", (e) => {
            gamepadStatus.textContent = `🎮 کۆنتڕۆڵەر بە سەرکەوتوویی بەسترا: ${e.gamepad.id}`;
            gamepadStatus.style.color = "#4caf50";
        });

        window.addEventListener("gamepaddisconnected", (e) => {
            gamepadStatus.textContent = "❌ کۆنتڕۆڵەر بڕدرا؛ تکایە دووبارە بیبەستەوە";
            gamepadStatus.style.color = "#888";
        });

        // خوێندنەوە و جیاکردنەوەی جۆری فایلەکان
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileExtension = file.name.split('.').pop().toLowerCase();
                placeholder.textContent = `🔄 فایلی (.${fileExtension}) ناسرایەوە. باردەکرێت: ${file.name}...`;
                
                // لێرەوە مەکینەی وێبەکە بڕیار دەدات چۆن فایلەکە بکاتەوە
                if (fileExtension === 'zip' || fileExtension === '7z') {
                    placeholder.textContent += "\n[تێبینی: فایلەکە کۆمپریس کراوە، سیستەمەکە پێش کارپێکردن دەیکاتەوە]";
                }
            }
        });
    </script>
</body>
</html>
