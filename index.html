<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cloud PS2 Player</title>
    <style>
        /* Absolute Fix for iPad Scrolling & Browser Shaking */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden !important; position: fixed;
            background-color: #030307; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none;
            touch-action: none;
        }

        .neon-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #110729 0%, #030307 100%);
            z-index: 1;
        }

        .app-grid {
            position: relative; z-index: 5; display: flex;
            flex-direction: column; width: 100%; height: 100%;
            box-sizing: border-box;
            padding-bottom: env(safe-area-inset-bottom);
        }

        header {
            padding: 15px 30px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 22px; font-weight: 900;
            background: linear-gradient(45deg, #ff0055, #00ffcc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .screen-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 15px; box-sizing: border-box; min-height: 0;
        }

        .cinema-box {
            width: 100%; max-width: 800px; height: 100%; max-height: 500px;
            aspect-ratio: 4 / 3; background: #000; border-radius: 20px; position: relative;
            overflow: hidden; box-shadow: 0 0 50px rgba(255, 0, 85, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        iframe { width: 100%; height: 100%; border: none; display: none; }

        .intro-poster {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(0deg, #030307 20%, rgba(0,0,0,0.1) 100%),
                        url('https://images.alphacoders.com/605/605511.jpg') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 40px; box-sizing: border-box;
        }

        .poster-title {
            font-size: 34px; font-weight: 900; color: #fff; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 0 20px #ff0055; margin-bottom: 15px;
        }

        .control-station {
            background: rgba(8, 8, 16, 0.85);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 20px 30px; display: flex; flex-direction: column; align-items: center;
            gap: 12px; border-top: 1px solid rgba(255, 255, 255, 0.06);
            box-sizing: border-box;
        }

        .input-glow-wrapper { display: flex; gap: 12px; width: 100%; max-width: 650px; }

        .cyber-input {
            flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0, 0, 0, 0.5); color: #00ffcc; font-size: 14px; outline: none;
            direction: ltr;
        }

        .cyber-btn {
            background: linear-gradient(90deg, #ff0055, #ff00aa); color: white;
            padding: 14px 26px; border: none; border-radius: 12px; cursor: pointer;
            font-size: 14px; font-weight: bold; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3); text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .cyber-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255, 0, 85, 0.5); }

        .btn-node {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: none; color: #ccc; font-size: 13px; padding: 10px 20px;
        }

        .virtual-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .v-button {
            position: absolute; width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; pointer-events: auto;
        }

        .bar-container {
            width: 100%; max-width: 400px; background: rgba(255,255,255,0.04);
            height: 5px; border-radius: 10px; overflow: hidden; display: none; margin-top: 5px;
        }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffcc, #ff0055); }
    </style>
</head>
<body>

    <div class="neon-bg"></div>

    <div class="app-grid">
        <header>
            <div class="logo">PS2 CLOUD PLAYER</div>
            <div id="pad-status" style="color: #ff0055; font-size: 13px; font-weight: bold;">⚡ SYSTEM READY</div>
        </header>

        <div class="screen-wrapper">
            <div class="cinema-box" id="main-box">
                <div class="intro-poster" id="poster-view">
                    <div class="poster-title" id="game-title-display">God of War Hub</div>
                    <div style="font-size: 13px; color: #00ffcc; font-weight: bold; margin-bottom: 20px;">PASTE ANY PS2 ISO URL TO STREAM</div>
                </div>

                <iframe id="emu-frame" src=""></iframe>

                <div class="virtual-pad" id="v-pad">
                    <div class="v-button" style="bottom: 45px; right: 45px;">🗙</div>
                    <div class="v-button" style="bottom: 115px; right: 45px; color: #ff0055;">△</div>
                    <div class="v-button" style="bottom: 45px; right: 115px; color: #ffaa00;">◯</div>
                    <div class="v-button" style="bottom: 50px; left: 50px; border-radius: 15px;">🕹️</div>
                </div>
            </div>
        </div>

        <div class="control-station">
            <div class="input-glow-wrapper">
                <input type="text" id="target-url" class="cyber-input" placeholder="Paste God of War 1 or 2 Direct .ISO URL here...">
                <button class="cyber-btn" onclick="startCloudStream()">STREAM GAME</button>
            </div>

            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <label class="cyber-btn btn-node" for="file-selector">LOAD LOCAL ISO</label>
                <input type="file" id="file-selector" style="display: none;" accept=".iso,.bin">
                
                <button class="cyber-btn btn-node" onclick="toggleVirtualPad()">TOUCH CONTROLS</button>
                <button class="cyber-btn btn-node" style="color: #ff0055;" onclick="clearCache()">🧹 RESET ENGINE</button>
            </div>

            <div class="bar-container" id="bar-box"><div class="bar-fill" id="bar-fill"></div></div>
            <div id="console-log" style="font-size: 12px; color: #666; font-weight: bold;">READY TO STREAM</div>
        </div>
    </div>

    <script>
        const emuFrame = document.getElementById('emu-frame');
        const posterView = document.getElementById('poster-view');
        const barBox = document.getElementById('bar-box');
        const barFill = document.getElementById('bar-fill');
        const consoleLog = document.getElementById('console-log');
        const vPad = document.getElementById('v-pad');

        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        // 🛠️ سیستمی نوێ: بۆ کارپێکردنی ڕاستەوخۆی لێنکی هەر کایەیەک بێ هەڵەی 404
        function startCloudStream() {
            const url = document.getElementById('target-url').value.trim();
            if(!url) return alert("Please paste a direct PS2 .iso URL first!");
            
            barBox.style.display = 'block';
            barFill.style.width = '100%';
            consoleLog.textContent = "ESTABLISHING SECURE ISO STREAM NODE...";

            setTimeout(() => {
                barBox.style.display = 'none';
                posterView.style.display = 'none';
                emuFrame.style.display = 'block';
                
                // بەکارهێنانی مۆدی گشتی بۆ خوێندنەوەی دەستبەجێی فایلی دەرەکی
                emuFrame.src = "https://purei.org/play/" + "?rom=" + encodeURIComponent(url);
                consoleLog.textContent = "STREAM ACTIVE! LOADING CONTENT FROM TARGET SERVER...";
            }, 1200);
        }

        document.getElementById('file-selector').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            barBox.style.display = 'block';
            let p = 0;
            const t = setInterval(() => {
                p += 10; barFill.style.width = p + '%';
                if(p >= 100) { 
                    clearInterval(t); barBox.style.display = 'none'; posterView.style.display = 'none';
                    emuFrame.style.display = 'block'; emuFrame.src = "https://purei.org/play/"; 
                }
            }, 50);
        });

        function clearCache() {
            localStorage.clear(); sessionStorage.clear();
            emuFrame.src = "about:blank"; emuFrame.style.display = 'none'; posterView.style.display = 'flex';
            document.getElementById('target-url').value = "";
            alert("Engine and input fields reset successfully!");
        }

        // پادەکەت لێرە کار دەکات
        function toggleVirtualPad() { vPad.style.display = (vPad.style.display === 'block') ? 'none' : 'block'; }
    </script>
</body>
</html>
